# OMEGA AI Web Platform CI/CD Pipeline
# 
# This pipeline ensures code quality and stability by running:
# - npm install (dependency verification)
# - npm run lint (code style and quality)
# - npm run test (unit and integration tests)
# - npm run build (production build verification)
# - TypeScript type checking (via build)
#
# Pipeline fails on any of these checks failing.

image: node:20-alpine

stages:
  - install
  - verify
  - build

variables:
  npm_config_cache: "$CI_PROJECT_DIR/.npm"
  CACHE_COMPRESSION_LEVEL: "fastest"

cache:
  key:
    files:
      - package.json
  paths:
    - .npm/
    - node_modules/

# Install dependencies
install:dependencies:
  stage: install
  script:
    - npm install --cache .npm --prefer-offline
  artifacts:
    paths:
      - node_modules/
    expire_in: 1 hour
  only:
    - main
    - merge_requests

# Lint code
verify:lint:
  stage: verify
  dependencies:
    - install:dependencies
  script:
    - npm run lint
  only:
    - main
    - merge_requests
  allow_failure: false

# Run tests
verify:test:
  stage: verify
  dependencies:
    - install:dependencies
  script:
    - npm run test
  only:
    - main
    - merge_requests
  allow_failure: false

# Build for production
build:production:
  stage: build
  dependencies:
    - install:dependencies
  script:
    - npm run build
  artifacts:
    paths:
      - .next/
    expire_in: 1 day
  only:
    - main
    - merge_requests
  allow_failure: false
